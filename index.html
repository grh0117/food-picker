function jsonp(url, params={}, timeout=14000){
  return new Promise((resolve, reject)=>{
    const cb = `amap_cb_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    const qs = new URLSearchParams({...params, output:'JSON', callback:cb}).toString();
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('请求超时，请检查网络或高德 Key 是否可用')); }, timeout);
    function cleanup(){ clearTimeout(timer); delete window[cb]; script.remove(); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('高德接口加载失败，请检查 Key、域名白名单或网络')); };
    script.src = `${url}?${qs}`;
    document.body.appendChild(script);
  });
}

  const data = await jsonp('https://restapi.amap.com/v3/geocode/geo', { key:AMAP_KEY, address });
  if(data.status !== '1' || !data.geocodes?.length) throw new Error(data.info || '地址解析失败，请输入更完整的地址');
  const geo = data.geocodes[0];
  return { location:geo.location, formattedAddress:geo.formatted_address || address, city:geo.city || '' };
}
async function placeAround({location, radius, types='050000', keywords='', page=1}){
  const data = await jsonp('https://restapi.amap.com/v3/place/around', { key:AMAP_KEY, location, radius, types, keywords, offset:'25', page:String(page), extensions:'all', sortrule:'distance' });
  if(data.status !== '1'){ console.warn('AMap place error', data.info, {types,keywords,page}); return []; }
  return data.pois || [];
}
async function fetchCandidates(center){
  const tasks = [];
  const types = TYPES_BY_MEAL[state.meal] || TYPES_BY_MEAL.any;
  const keywords = Array.from(new Set([...(BASE_MEAL_KEYWORDS[state.meal] || []), state.taste].filter(Boolean)));
  for(const t of types){ for(let p=1; p<=PAGE_PER_TYPE; p++) tasks.push(() => placeAround({ location:center.location, radius:state.radius, types:t, page:p })); }
  for(const kw of keywords) tasks.push(() => placeAround({ location:center.location, radius:state.radius, types:'050000', keywords:kw, page:1 }));
  const all=[]; let cursor=0;
  async function worker(){ while(cursor < tasks.length){ const i = cursor++; setStatus(`正在处理...`); try{ all.push(...await tasks[i]()); }catch(e){ console.warn(e); } } }
  await Promise.all(Array.from({length:MAX_CONCURRENCY}, worker));
  return dedupeByPoiId(all);
}
function dedupeByPoiId(pois){
  const map = new Map();
  for(const poi of pois){ const id = poi.id || `${poi.name}_${poi.location}`; if(!map.has(id)) map.set(id, poi); }
  return [...map.values()];
}
function normalizeRestaurantName(name=''){
  let clean = String(name).trim();
  const chain = CHAIN_KEYWORDS.find(k => clean.includes(k));
  if(chain) return chain;
  clean = clean.replace(/[（(][^）)]{1,40}[）)]/g,'').split(/[｜|丨·•—–-]/)[0].trim();
  clean = clean.replace(/(旗舰店|直营店|加盟店|分店|总店)$/g,'').trim();
  clean = clean.replace(/(.{2,})([\u4e00-\u9fa5A-Za-z0-9]{1,12})店$/g, (m,prefix,branch)=>{
    const hints = ['路','街','道','号','广场','中心','大厦','商场','城','园','桥','站','大学','医院','社区','公园','村','口','门','区'];
    return hints.some(h => branch.includes(h)) ? prefix : m;
  }).trim();
  return clean || String(name).trim();
}
function dedupeByRestaurantName(pois){
  const map = new Map();
  for(const poi of pois){
    const displayName = normalizeRestaurantName(poi.name || '未命名餐厅');
    const key = displayName.toLowerCase();
    const next = {...poi, originalName: poi.name || displayName, displayName};
    const old = map.get(key);
    if(!old || Number(next.deliveryScore||0) > Number(old.deliveryScore||0) || (Number(next.deliveryScore||0) === Number(old.deliveryScore||0) && Number(next.distance||999999) < Number(old.distance||999999))) map.set(key,next);
  }
  return [...map.values()];
}

function getOpenTimeText(poi){
  const b = poi.biz_ext || {};
  const candidates = [b.open_time, b.opentime, b.open_time2, b.opentime2, b.business_time, poi.open_time, poi.opentime, poi.business_time].filter(Boolean);
  return candidates.map(v => typeof v === 'string' ? v : JSON.stringify(v)).join(' ');
}
function parseMinutes(hm){ const [h,m] = hm.split(':').map(Number); return h*60 + (m||0); }
function textShowsClosed(openText=''){
  return /暂停营业|休息|歇业|已关闭|未营业/.test(openText);
}
function openAtMinute(openText, targetMinute){
  if(!openText) return null; // null = 未知，不能证明关闭
  if(textShowsClosed(openText)) return false;
  if(/24小时|全天|00:00-24:00/.test(openText)) return true;
  const matches = [...openText.matchAll(/(\d{1,2}:\d{2})\s*[-~至—–]\s*(\d{1,2}:\d{2})/g)];
  if(!matches.length) return null;
  return matches.some(m => {
    const start = parseMinutes(m[1]); const end = parseMinutes(m[2]);
    if(start === end) return true;
    if(end < start) return targetMinute >= start || targetMinute <= end;
    return targetMinute >= start && targetMinute <= end;
  });
}
function isBreakfastOpen(poi){
  const text = getOpenTimeText(poi);
  const openAt8 = openAtMinute(text, 8*60);
  if(openAt8 === false) return false;
  // 如果现在就在早餐窗口，额外尽量确保现在也开门。
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  if(nowMin >= 5*60 && nowMin <= 10*60+30){
    const openNow = openAtMinute(text, nowMin);
    if(openNow === false) return false;
  }
  return true;
}
function isMealMainFood(poi){
  const text = textOf(poi);
  const type = poi.type || '';
  if(hasAny(text, MEAL_MAIN_NEGATIVE)) return false;
  if(type.includes('咖啡') || type.includes('甜品') || type.includes('糕饼') || type.includes('冷饮') || type.includes('茶艺')) return false;
  return true;
}
function scorePoi(poi){
  const text = textOf(poi);
  const type = poi.type || '';
  let score = 0;
  const reasons=[];
  if(hasAny(text, GLOBAL_NEGATIVE)) return {score:-999,reasons:['排除场所']};
  if((state.meal === 'lunch' || state.meal === 'dinner') && !isMealMainFood(poi)) return {score:-999,reasons:['排除饮品甜点']};
  if(state.meal === 'breakfast'){
    if(!hasAny(text, BREAKFAST_KEYWORDS) && !type.includes('快餐') && !type.includes('小吃') && !type.includes('糕饼') && !type.includes('咖啡')) return {score:-30,reasons:['非早餐倾向']};
    if(!isBreakfastOpen(poi)) return {score:-999,reasons:['早餐时段未营业']};
    score += 18; reasons.push('早餐可选');
  }
  for(const k of DELIVERY_KEYWORDS){ if(text.includes(k)) score += 8; }
  if(hasAny(text, DELIVERY_KEYWORDS)) reasons.push('外卖倾向');
  for(const k of CHAIN_KEYWORDS){ if(text.includes(k)) score += 16; }
  if(hasAny(text, CHAIN_KEYWORDS)) reasons.push('连锁门店');
  if(type.includes('快餐')) { score += 28; reasons.push('快餐'); }
  if(type.includes('小吃')) { score += 20; reasons.push('小吃'); }
  if(type.includes('中餐厅')) { score += 12; reasons.push('正餐'); }
  if(type.includes('外国餐厅')) { score += 8; reasons.push('正餐'); }
  if(hasAny(text, ['炒菜','家常菜','小炒','川菜','湘菜','东北菜','粤菜','江西小炒','木桶饭'])) { score += 18; reasons.push('正餐外卖'); }
  if(hasAny(text, ['麻辣烫','麻辣香锅','冒菜','酸菜鱼','烤鱼','水煮鱼','黄焖鸡','鸡公煲','煲仔饭','烧腊','卤味'])) { score += 18; reasons.push('热门正餐'); }
  if(state.taste && text.includes(state.taste)) { score += 25; reasons.push('口味命中'); }
  const dist = Number(poi.distance || 99999);
  if(dist <= 800) score += 12; else if(dist <= 1500) score += 8; else if(dist <= 3000) score += 4;
  return {score: Math.round(score), reasons:[...new Set(reasons)].slice(0,3)};
}
function rankPois(pois){
  const ranked = pois.map(p => { const s=scorePoi(p); return {...p, deliveryScore:s.score, reasons:s.reasons}; })
    .filter(p => p.deliveryScore > 0)
    .sort((a,b) => b.deliveryScore - a.deliveryScore);
  return dedupeByRestaurantName(ranked).sort((a,b) => b.deliveryScore - a.deliveryScore);
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickTop5(){ const pool = state.lastRanked.slice(0, Math.min(TOP_POOL_SIZE, state.lastRanked.length)); return shuffle(pool).slice(0,5); }
function amapUrl(poi){ const name=encodeURIComponent(poi?.displayName || poi?.name || '餐厅'); return `https://uri.amap.com/marker?position=${poi.location}&name=${name}&src=food-picker&coordinate=gaode&callnative=1`; }
function getPoiImage(poi){
  const photos = Array.isArray(poi?.photos) ? poi.photos : [];
  const photo = photos.find(x => x && typeof x.url === 'string' && x.url.trim());
  return photo ? photo.url.trim() : '';
}
function updateHeroImage(poi){
  const url = getPoiImage(poi);
  els.heroImage.onerror = () => { els.heroImage.onerror = null; els.heroImage.src = FALLBACK_FOOD_IMAGE; };
  els.heroImage.src = url || FALLBACK_FOOD_IMAGE;
  els.heroImage.alt = url ? `${poi.displayName || poi.name || '推荐餐厅'} 的高德图片` : '食物氛围图';
}

function renderResults(list){
  state.lastPicked = list;
  const poolN = Math.min(TOP_POOL_SIZE, state.lastRanked.length);
  els.poolBadge.innerHTML = `<span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">star</span> Top ${poolN || TOP_POOL_SIZE} 名单`;
  if(!list.length){
    updateHeroImage(null);
    els.featuredName.textContent = '正在处理...';
    els.featuredTags.innerHTML = '<span class="bg-surface-container-high text-on-secondary-container px-3 py-1 rounded-full text-xs font-medium">请稍等</span>';
    els.featuredAddress.innerHTML = '<span class="material-symbols-outlined text-primary-container animate-pulse">hourglass_top</span> 正在处理...';
    els.mapLink.classList.add('disabled');
    els.resultGrid.innerHTML = '<div class="bg-white p-5 rounded-2xl shadow-sm border border-outline-variant/30 sm:col-span-2"><h3 class="text-xl font-bold text-primary">正在处理...</h3><p class="mt-2 text-secondary">正在为你筛选更合适的候选。</p></div>';
    els.reshuffleBtn.classList.add('disabled');
    return;
  }
  const first = list[0];
  updateHeroImage(first);
  els.featuredName.textContent = first.displayName || first.name || '推荐餐厅';
  els.featuredTags.innerHTML = `<span class="bg-surface-container-high text-on-secondary-container px-3 py-1 rounded-full text-xs font-medium">${escapeHtml(cleanType(first.type))}</span><span class="bg-surface-container-high text-on-secondary-container px-3 py-1 rounded-full text-xs font-medium">${first.distance || '?'}m</span><span class="bg-surface-container-high text-on-secondary-container px-3 py-1 rounded-full text-xs font-medium">等概率抽取</span>`;
  els.featuredAddress.innerHTML = `<span class="material-symbols-outlined text-primary-container">location_on</span>${escapeHtml(first.address || '暂无地址')}`;
  els.mapLink.href = amapUrl(first); els.mapLink.classList.remove('disabled');
  els.reshuffleBtn.classList.toggle('disabled', state.lastRanked.length < 5);
  els.resultGrid.innerHTML = list.slice(1).map((poi, idx)=> cardHtml(poi, idx+2)).join('');
  document.getElementById('featuredCard').classList.remove('pop-in');
  void document.getElementById('featuredCard').offsetWidth;
  document.getElementById('featuredCard').classList.add('pop-in');
}
function cardHtml(poi, num){
  return `<div class="bg-white p-5 rounded-2xl shadow-sm border border-outline-variant/30 hover:shadow-md transition-shadow pop-in">
    <div class="flex justify-between mb-3"><span class="text-primary font-bold text-2xl">${String(num).padStart(2,'0')}</span><span class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded text-[10px] font-bold uppercase">候选结果</span></div>
    <h3 class="text-xl font-semibold text-on-surface truncate">${escapeHtml(poi.displayName || poi.name || '未命名餐厅')}</h3>
    <div class="flex justify-between items-center mt-2 text-xs text-secondary"><span>${escapeHtml(cleanType(poi.type))}</span><span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">near_me</span>${poi.distance || '?'}m</span></div>
    <p class="mt-3 text-sm text-outline truncate">${escapeHtml(poi.address || '暂无地址')}</p>
    <a class="mt-4 inline-flex text-sm font-bold text-primary hover:underline" href="${amapUrl(poi)}" target="_blank" rel="noreferrer">高德地图查看 →</a>
  </div>`;
}
async function runSearch(){
  const addr = els.address.value.trim();
  if(!addr){ setStatus('请先输入地址。'); return; }
  setBusy(true); state.lastRanked=[]; renderResults([]);
  try{
    setStatus(`正在处理...`);
    const center = await geocode(addr); state.center = center;
    setStatus(`正在处理...`);
    const pois = await fetchCandidates(center);
    setStatus(`正在处理...`);
    state.lastRanked = rankPois(pois);
    const picked = pickTop5(); renderResults(picked);
    setStatus(`已完成：从 Top ${Math.min(TOP_POOL_SIZE,state.lastRanked.length)} 中等概率抽出 5 个。`);
  }catch(e){ console.error(e); setStatus(e.message || '请求失败。'); renderResults([]); els.featuredName.textContent='出错了'; els.featuredAddress.innerHTML=`<span class="material-symbols-outlined text-primary-container">location_on</span>${escapeHtml(e.message || '请稍后重试')}`; }
  finally{ setBusy(false); }
}


function currentPickedSummary(){
  if(!state.lastPicked?.length) return '';
  return state.lastPicked.map((p,i)=>{
    const name = p.displayName || p.name || '未命名餐厅';
    const type = cleanType(p.type);
    const address = p.address || '暂无地址';
    return `${i+1}. ${name}｜类型：${type}｜地址：${address}`;
  }).join('\n');
}
function buildAIPrompt(userText){
  const mealName = ({breakfast:'早餐', lunch:'午餐', dinner:'晚餐', any:'不限'})[state.meal] || state.meal;
  const hasResults = state.lastPicked && state.lastPicked.length > 0;
  if(!hasResults){
    return {
      system: AI_SYSTEM_PROMPT_BASE,
      user: `用户还没有筛选餐厅。用户问题：${userText}。请不要输出任何具体餐厅名；只给出适合的口味、菜系、菜品类型或点餐建议，必须是自然流畅的简体中文。`
    };
  }
  return {
    system: AI_SYSTEM_PROMPT_WITH_RESULTS,
    user: `用户正在用“今天吃什么”网页选餐。\n地址：${els.address.value.trim() || '未知'}\n用餐时段：${mealName}\n搜索范围：${Number(state.radius)/1000}km\n当前抽到的5个候选餐厅：\n${currentPickedSummary()}\n用户偏好/问题：${userText}\n请只能从这5个里推荐最合适的一家或两家，必须使用候选餐厅原名，并说明理由。距离不是推荐因素，不要说因为近/远/距离合适。必须是自然流畅的简体中文。`
  };
}
function fallbackAIAnswer(userText){
  const t = userText || '';
  if(t.includes('辣')) return '想吃辣的，可以优先选川菜、湘菜、麻辣香锅、冒菜、麻辣烫、酸菜鱼或小炒类。口味重一点就选麻辣香锅/川湘菜，想省事快捷就选盖饭、面馆或麻辣烫。';
  if(t.includes('清淡') || t.includes('健康') || t.includes('轻')) return '想清淡一点，可以优先选轻食沙拉、粥粉面、蒸菜、粤菜、家常小炒或健康餐。尽量避开烧烤、炸鸡、麻辣香锅和重油重辣的品类。';
  if(t.includes('快') || t.includes('赶')) return '想快一点，建议选快餐、盖饭、便当、面馆、米粉米线或黄焖鸡这类出餐稳定的品类。品类简单、出餐稳定的店通常更适合工作日快速解决。';
  return '可以先按今天的心情选方向：想热乎选面、粥、砂锅；想重口选川湘菜、麻辣香锅；想轻一点选轻食、沙拉、粤菜；想省事选盖饭、便当或快餐。';
}
function looksBrokenAIText(text){
  if(!text) return true;
  const cleaned = text.replace(/https?:\/\/\S+/g,'');
  const latin = (cleaned.match(/[A-Za-z]{3,}/g) || []).join('').length;
  const cjk = (cleaned.match(/[\u4e00-\u9fff]/g) || []).length;
  const badFragments = ['kukudaijie','kukulu','tô','Ã','�'];
  return badFragments.some(x => cleaned.toLowerCase().includes(x.toLowerCase())) || (latin > 8 && latin > cjk * 0.35);
}
function sanitizeAIAnswer(text, userText){
  const content = String(text || '').trim();
  if(looksBrokenAIText(content)) return fallbackAIAnswer(userText);
  return content;
}

async function askFoodAI(){
  const userText = els.aiInput.value.trim();
  if(!userText){ els.aiAnswer.textContent = '先告诉我你想吃什么口味、预算、忌口或心情。'; return; }
  els.aiBtn.disabled = true;
  const old = els.aiBtn.innerHTML;
  els.aiBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
  els.aiAnswer.textContent = 'AI 正在思考中...';
  const aiPrompt = buildAIPrompt(userText);
  try{
    const res = await fetch(`${SILICONFLOW_BASE_URL}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SILICONFLOW_API_KEY}` },
      body: JSON.stringify({
        model: SILICONFLOW_MODEL,
        temperature: 0.25,
        top_p: 0.8,
        max_tokens: 260,
        messages: [
          { role: 'system', content: aiPrompt.system },
          { role: 'user', content: aiPrompt.user }
        ]
      })
    });
    if(!res.ok){ throw new Error(`硅基流动请求失败：${res.status}`); }
    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content?.trim();
    els.aiAnswer.textContent = sanitizeAIAnswer(content, userText) || 'AI 没有返回内容，请稍后再试。';
  }catch(e){
    console.error(e);
    els.aiAnswer.textContent = 'AI 调用失败。若是浏览器跨域限制，可改成后端代理；当前餐厅搜索不受影响。';
  }finally{
    els.aiBtn.disabled = false;
    els.aiBtn.innerHTML = old;
  }
}

document.querySelectorAll('.meal-btn').forEach(btn => btn.addEventListener('click', ()=>{

els.geoBtn.addEventListener('click', runSearch);

els.address.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch(); });

document.querySelectorAll('#inspireChips button').forEach(b => b.addEventListener('click', ()=>{ els.aiInput.value = `我想吃${b.dataset.tip}，给我一个简短建议`; askFoodAI(); }));
els.locateBtn.addEventListener('click', ()=> setStatus('当前版本使用地址输入更稳定；浏览器定位可后续接入。'));
</script>
